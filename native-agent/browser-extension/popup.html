<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F172A;
      color: #E2E8F0;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 14px;
      margin: 0;
      color: #60A5FA;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #1E293B;
      margin-bottom: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22C55E;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .info {
      font-size: 12px;
      color: #94A3B8;
      line-height: 1.6;
    }
    #violation-count {
      font-weight: bold;
      color: #F97316;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🛡️</span>
    <h1>ExamGuardrail Sentinel</h1>
  </div>

  <div class="status">
    <div class="dot"></div>
    <span style="font-size: 13px;">Monitoring Active</span>
  </div>

  <div class="info">
    <p>Violations detected: <span id="violation-count">0</span></p>
    <p>Session: <span id="session-id">—</span></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
